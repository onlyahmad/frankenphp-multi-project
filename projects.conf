# =============================================================
# Konfigurasi Project FrankenPHP
# =============================================================
# Format: NAMA_PROJECT:PORT:PATH_RELATIF
#
# - NAMA_PROJECT  : Nama unik project (tanpa spasi)
# - PORT          : Port yang digunakan (harus unik)
# - PATH_RELATIF  : Path ke root Laravel project (relatif dari ./html/)
#
# Contoh:
#   ksb-maju:8888:ksb-maju
#   be-ppid-pembantu:8989:be-ppid-pembantu/html
#   e-office:9090:e-office
#
# Setelah menambah/mengubah project, jalankan:
#   ./generate.sh
#   podman-compose -f podman-compose.yml up -d --force-recreate app
# =============================================================

ksb-maju:8888:ksb-maju
be-ppid-pembantu:8989:be-ppid-pembantu/html
e-office:9090:e-office
